<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>远方来信 · 心动告白</title>
    <style>
        /* 全局重置 —— 保证在苹果手机上完美全屏 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent; /* 去掉移动端点击灰块 */
            touch-action: pan-y; /* 优化触摸 */
        }

        /* 两个主屏幕 —— 通过透明度与可见性切换，保证转场柔和 */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;  /* 隐藏时不可点击 */
            padding: 20px;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;   /* 激活时可交互 */
        }

        /* ---------- 第一屏：黑色信封 ---------- */
        #screen1 {
            background: #000000;    /* 纯黑背景 */
            justify-content: center;
        }

        /* 信封容器 —— 纯CSS绘制白色信封，大小适配手机 */
        .envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10vh;    /* 与下方文字拉开距离 */
        }

        .envelope {
            position: relative;
            width: min(70vw, 280px);
            height: min(50vw, 200px);
            background: white;
            border-radius: 8px 8px 12px 12px;
            box-shadow: 0 20px 30px rgba(255, 255, 255, 0.08);
            margin-bottom: 5px;
        }

        /* 信封封口三角 (折线) */
        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: min(35vw, 140px) solid transparent;
            border-right: min(35vw, 140px) solid transparent;
            border-top: min(22vw, 90px) solid #e0e0e0;
            border-radius: 2px;
            transform: translateY(-1px);
        }

        /* 信封下部的两条斜线 (装饰) */
        .envelope::after {
            content: "";
            position: absolute;
            bottom: 20%;
            left: 15%;
            width: 70%;
            height: 2px;
            background: #ccc;
            opacity: 0.5;
        }

        /* 信封上的小心形 (增加浪漫细节) */
        .envelope-heart {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: #ff4d6d;
            rotate: 45deg;
            box-shadow: 0 0 8px #ffb3c1;
            z-index: 2;
        }
        .envelope-heart::before,
        .envelope-heart::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff4d6d;
            border-radius: 50%;
        }
        .envelope-heart::before {
            left: -10px;
            top: 0;
        }
        .envelope-heart::after {
            top: -10px;
            left: 0;
        }

        /* 打字机文字容器 */
        .typewriter-line {
            color: white;
            font-size: 18px;
            letter-spacing: 2px;
            text-align: center;
            min-height: 70px;
            padding: 0 15px;
            font-weight: 300;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
            max-width: 90vw;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* 提示小手 —— 暗示可点击 */
        #screen1 {
            cursor: pointer;
        }

        /* ---------- 第二屏：照片背景 + 书信 + 红心 ---------- */
        #screen2 {
            /* 背景图片通过 JS 动态设置，此处写默认备用 */
            background: #1a1a2e no-repeat center center / cover;
            justify-content: flex-start;  /* 内容从顶部开始布局 */
            padding-top: 12vh;            /* 留出顶部空间 */
            color: white;
            text-shadow: 0 2px 12px rgba(0,0,0,0.7);
        }

        /* 书信文字主容器 —— 左右间距3字符(约3em)，居中显示 */
        .letter-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 0 1.8em;    /* 左右留出约3字符距离 (1em ≈ 1汉字宽度) */
            box-sizing: border-box;
        }

        /* 主要信息文字区 (正文逐字显示) */
        .message-body {
            font-size: 17px;
            line-height: 1.75;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-word;
            font-weight: 400;
            margin-bottom: 18px;
            text-shadow: 1px 1px 6px #00000080;
        }

        /* 署名区域 —— 右对齐，同样逐字显示 */
        .signature {
            text-align: right;
            font-size: 17px;
            line-height: 1.8;
            white-space: pre-wrap;
            margin-top: 5px;
            text-shadow: 1px 1px 6px #000000b3;
            font-weight: 400;
            padding-right: 0.2em;
        }

        /* 正文第一行缩进两个字符 —— 通过添加样式，但因为逐字显示会动态填充，
           我们采用JS在内容前插入两个全角空格（　　），更可靠。同时保留此样式做后备 */
        .message-body {
            text-indent: 0;   /* 实际用空格控制 */
        }

        /* 3D 跳动红心 —— 位于画面下方 */
        .heart-3d-container {
            position: absolute;
            bottom: 8vh;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 10px 15px rgba(255, 40, 80, 0.4));
            z-index: 10;
        }

        .beating-heart {
            position: relative;
            width: 70px;
            height: 70px;
            background: #ff1e4d;
            transform: rotate(45deg);
            animation: heartBeat3D 1.4s infinite ease-in-out;
            box-shadow:
                0 8px 0 #a01030,
                0 12px 20px rgba(0,0,0,0.3),
                inset 0 -5px 8px rgba(0,0,0,0.2),
                inset 0 5px 8px rgba(255,255,255,0.5);
            border-radius: 6px 6px 0 6px;
        }

        .beating-heart::before,
        .beating-heart::after {
            content: "";
            position: absolute;
            width: 70px;
            height: 70px;
            background: #ff1e4d;
            border-radius: 50%;
            box-shadow: inset -3px -2px 5px rgba(0,0,0,0.15), inset 2px 2px 5px rgba(255,255,255,0.5);
        }

        .beating-heart::before {
            left: -35px;
            top: 0;
        }

        .beating-heart::after {
            top: -35px;
            left: 0;
        }

        /* 跳动动画 (带有3D缩放感) */
        @keyframes heartBeat3D {
            0% { transform: rotate(45deg) scale(1); }
            25% { transform: rotate(45deg) scale(1.1); }
            45% { transform: rotate(45deg) scale(0.95); }
            65% { transform: rotate(45deg) scale(1.08); }
            85% { transform: rotate(45deg) scale(1); }
            100% { transform: rotate(45deg) scale(1); }
        }

        /* 底部留白 */
        .spacer {
            flex: 1;
        }

        /* 音乐提示（不显示，仅用于调试，但保留） */
        .hidden-audio {
            display: none;
        }

        /* 移动端优化 */
        @media (max-width: 400px) {
            .message-body, .signature {
                font-size: 15px;
            }
            .envelope {
                width: 65vw;
                height: 46vw;
            }
            .envelope::before {
                border-left: 32.5vw solid transparent;
                border-right: 32.5vw solid transparent;
                border-top: 21vw solid #e0e0e0;
            }
        }
    </style>
</head>
<body>

    <!-- 背景音乐 (用户交互后播放) -->
    <audio id="bgMusic" class="hidden-audio" loop preload="auto">
        <!-- 音乐文件路径：请将您的音乐文件放在 music 文件夹下，并修改为正确的文件名 -->
        <source src="music/bgm.mp3" type="audio/mpeg">
        您的浏览器不支持音频播放。
    </audio>

    <!-- 第一屏：信封 + 打字邀请 -->
    <div id="screen1" class="screen active">
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="envelope-heart"></div>
            </div>
        </div>
        <div id="inviteText" class="typewriter-line"></div>
        <!-- 隐性提示：点击任意位置继续 -->
        <div style="color: #aaa; font-size: 13px; margin-top: 15px; opacity: 0.7; letter-spacing: 2px;">轻触屏幕 · 开启心意</div>
    </div>

    <!-- 第二屏：照片背景 + 书信 + 跳动红心 -->
    <div id="screen2" class="screen">
        <div class="letter-container">
            <!-- 正文区域：逐字显示主要内容（包含称呼与正文） -->
            <div id="mainMessage" class="message-body"></div>
            <!-- 署名区域：落款和日期，右对齐，同样逐字 -->
            <div id="signatureMessage" class="signature"></div>
        </div>
        <div class="spacer"></div>
        <!-- 3D红心 -->
        <div class="heart-3d-container">
            <div class="beating-heart"></div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            /* ==================== 配置区域 —— 请小白用户按说明修改 =================== */
            // 1. 您的照片：请将照片文件放在项目根目录下的 images 文件夹内，命名为 "photo.jpg" (支持 png/jpeg)
            //    如果想改名，修改下面的路径即可。推荐尺寸：1080x1920 竖屏照片效果最佳。
            const PHOTO_PATH = "images/photo.jpg";   // ← 照片路径

            // 2. 背景音乐：请将音乐文件放在 music 文件夹下，命名为 "bgm.mp3" (支持 mp3)
            //    若没有音乐，可忽略，代码会静默失败。
            const MUSIC_PATH = "music/bgm.mp3";       // ← 音乐路径

            // 3. 书信内容 (已按书信格式处理，正文前有两个全角空格实现首行缩进)
            //    称呼单独一行，正文首行缩进两个中文字符。
            const LETTER_BODY =
                "亲爱的Grace：\n" +
                "　　见字如面！去年十月，我们通过网络相识，之后的日子里更是聊得很投缘，感谢你带给我很多的快乐和分享，在你身上也学到了很多可贵的品质，认识你真的是我平凡一生中的幸运之事。人生海海，相逢已是上上签，不求未来，只看当下，真诚对待，愿彼此都能过好自己的一生！";

            // 署名与日期 (右对齐显示)
            const SIGNATURE_TEXT = "晓夺与您共勉\n2026年4月21日";

            // 打字速度 (毫秒/字符)
            const TYPE_SPEED = 60;        // 第一屏邀请文字速度
            const LETTER_SPEED = 55;      // 书信正文速度
            const SIGNATURE_SPEED = 65;   // 署名打字速度

            // ==================== 全局变量 ====================
            const screen1 = document.getElementById('screen1');
            const screen2 = document.getElementById('screen2');
            const inviteEl = document.getElementById('inviteText');
            const mainMsgEl = document.getElementById('mainMessage');
            const signMsgEl = document.getElementById('signatureMessage');
            const bgMusic = document.getElementById('bgMusic');

            // 打字定时器控制
            let typingTimer = null;
            let currentTypingCallback = null;

            // 状态锁：防止重复点击切换/重复打字
            let isScreenSwitched = false;       // 是否已经切换到第二屏
            let isTypingLetter = false;         // 第二屏打字是否进行中
            let musicPlayAttempted = false;

            // 第一屏邀请文字
            const INVITE_TEXT = "一位来自远方朋友的告白，请点击打开。";

            // ==================== 辅助函数：停止所有打字 ====================
            function clearAllTyping() {
                if (typingTimer) {
                    clearTimeout(typingTimer);
                    typingTimer = null;
                }
                if (currentTypingCallback) {
                    currentTypingCallback = null;
                }
            }

            // ==================== 第一屏：逐字显示邀请 ====================
            function typeInviteText() {
                return new Promise((resolve) => {
                    let index = 0;
                    inviteEl.textContent = '';

                    function typeNext() {
                        if (index < INVITE_TEXT.length) {
                            inviteEl.textContent += INVITE_TEXT.charAt(index);
                            index++;
                            typingTimer = setTimeout(typeNext, TYPE_SPEED);
                        } else {
                            typingTimer = null;
                            resolve();
                        }
                    }
                    typeNext();
                });
            }

            // ==================== 第二屏：书信打字 (主要部分) ====================
            function typeLetterBody() {
                return new Promise((resolve) => {
                    let index = 0;
                    mainMsgEl.textContent = '';
                    const text = LETTER_BODY;

                    function typeChar() {
                        if (index < text.length) {
                            mainMsgEl.textContent += text.charAt(index);
                            index++;
                            typingTimer = setTimeout(typeChar, LETTER_SPEED);
                        } else {
                            typingTimer = null;
                            resolve();
                        }
                    }
                    typeChar();
                });
            }

            // 署名打字
            function typeSignature() {
                return new Promise((resolve) => {
                    let index = 0;
                    signMsgEl.textContent = '';
                    const text = SIGNATURE_TEXT;

                    function typeChar() {
                        if (index < text.length) {
                            signMsgEl.textContent += text.charAt(index);
                            index++;
                            typingTimer = setTimeout(typeChar, SIGNATURE_SPEED);
                        } else {
                            typingTimer = null;
                            resolve();
                        }
                    }
                    typeChar();
                });
            }

            // ==================== 切换至第二屏：设置背景、开始打字、音乐、红心 ====================
            async function switchToScreen2() {
                if (isScreenSwitched) return;
                isScreenSwitched = true;

                // 清除第一屏所有可能的打字
                clearAllTyping();

                // 1. 设置第二屏背景照片 (使用用户准备好的照片)
                //    如果图片加载失败，不会报错，背景会显示默认色，但浪漫感不减。
                const img = new Image();
                img.src = PHOTO_PATH;
                img.onload = function() {
                    screen2.style.backgroundImage = `url('${PHOTO_PATH}')`;
                };
                img.onerror = function() {
                    console.warn("照片加载失败，请检查路径: " + PHOTO_PATH);
                    // 保留默认深色背景，不影响体验
                };
                // 立即尝试应用背景 (大多数情况已缓存)
                screen2.style.backgroundImage = `url('${PHOTO_PATH}')`;

                // 2. 尝试播放音乐 (需要用户手势，点击事件已满足)
                if (!musicPlayAttempted) {
                    musicPlayAttempted = true;
                    // 重新设置src确保路径正确
                    if (bgMusic) {
                        // 如果用户修改了音乐路径，在代码开头已经配置，但这里再确保一下
                        const source = bgMusic.querySelector('source');
                        if (source) source.src = MUSIC_PATH;
                        bgMusic.load();
                        bgMusic.play().catch(e => {
                            // 移动端自动播放可能被限制，但用户点击触发，大概率成功；若失败静默。
                            console.log("音乐播放需要用户交互，已尝试:", e);
                        });
                    }
                }

                // 3. 切换屏幕显示
                screen1.classList.remove('active');
                screen2.classList.add('active');

                // 4. 开始逐字显示书信内容 (先正文，再署名)
                isTypingLetter = true;
                clearAllTyping(); // 二次保证

                try {
                    await typeLetterBody();       // 显示正文
                    await typeSignature();        // 显示署名
                } catch (err) {
                    console.warn("打字出错", err);
                }
                isTypingLetter = false;
            }

            // ==================== 点击事件：第一屏任意位置切换到第二屏 ====================
            function onScreen1Click() {
                if (isScreenSwitched) return;

                // 停止第一屏打字 (防止切换后还在打字)
                clearAllTyping();

                // 立即切换到第二屏
                switchToScreen2();
            }

            // ==================== 初始化第一屏：显示信封并开始打字 ====================
            async function initScreen1() {
                // 先清空可能残留文字
                inviteEl.textContent = '';
                // 开始逐字显示邀请
                await typeInviteText();
                // 打字完成后，不做额外动作，等待点击
            }

            // ==================== 绑定事件 & 启动 ====================
            function bindEvents() {
                // 第一屏监听点击 (整个屏幕)
                screen1.addEventListener('click', onScreen1Click);

                // 为了防止触摸时页面滚动或缩放干扰，但不影响点击
                screen1.addEventListener('touchstart', (e) => {
                    // 只是为了让点击更灵敏，无其他操作
                }, { passive: true });

                // 第二屏不需要切换点击，但为防止误触，不绑定切换事件。
                // 如果用户想在第二屏再次点击不做操作（符合设计）
            }

            // 预加载照片 (让切换更平滑)
            function preloadPhoto() {
                const preImg = new Image();
                preImg.src = PHOTO_PATH;
            }

            // ==================== 启动一切 ====================
            function start() {
                // 预加载照片
                preloadPhoto();
                // 绑定事件
                bindEvents();
                // 开始第一屏打字效果
                initScreen1().catch(console.warn);

                // 小提示：如果音乐文件路径错误，在控制台会显示，不影响主要功能。
                console.log("💌 远方来信已准备就绪。点击屏幕开启心动。");
            }

            start();

            /* ==================== 详细使用说明 (小白请看) ====================
             *
             * 【项目结构】请按以下方式放置文件 (在 PyCharm 中创建对应文件夹)：
             *   项目根目录/
             *       index.html          (本文件)
             *       images/
             *            photo.jpg      (您准备好的照片，建议竖屏)
             *       music/
             *            bgm.mp3        (背景音乐，可选)
             *
             * 【如何修改照片和音乐】
             *   1. 照片：将您的照片重命名为 photo.jpg 放入 images 文件夹。
             *      如果想用其他名字，修改上面 PHOTO_PATH 变量。
             *   2. 音乐：将音乐文件重命名为 bgm.mp3 放入 music 文件夹。
             *      如果没有音乐，程序会静默忽略，不影响体验。
             *
             * 【如何在手机上测试】
             *   方法A (推荐)：使用 PyCharm 内置的预览功能（右上角浏览器图标），
             *               然后用手机访问电脑ip (需同一WiFi)。
             *   方法B：将整个文件夹上传到免费的静态托管服务（如 GitHub Pages、Netlify Drop），
             *          获得一个公网链接，即可通过微信/抖音发送。
             *
             * 【实现网址链接的方式】
             *   1. 本地测试：PyCharm 右键点击 index.html -> Open in -> Browser，
             *      复制地址栏的 http://xxx.xxx.xxx.xxx:端口/ 链接，手机连同一WiFi可访问。
             *   2. 公网链接：推荐使用 Netlify (https://app.netlify.com/drop)，
             *      直接将整个项目文件夹拖入网页，几秒后生成一个 https://xxx.netlify.app 链接。
             *      该链接永久有效，发送给朋友即可。
             *
             * 【书信格式说明】
             *   - 正文前有两个全角空格(　　)实现首行缩进两个字符。
             *   - 署名与日期自动右对齐。
             *   - 所有文字均逐字出现，浪漫氛围拉满。
             *
             * 【注意事项】
             *   - 苹果手机Safari对自动播放音乐有限制，但用户点击后播放通常能成功。
             *   - 照片请使用常见格式(jpg/png)，避免过大影响加载。
             *   - 如果信封显示异常，请确保网络通畅（无外部依赖，纯CSS）。
             *
             * 祝你告白成功！💖
             ============================================================ */
        })();
    </script>
</body>
</html>
